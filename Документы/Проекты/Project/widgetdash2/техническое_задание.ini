Нужно создать расширение для браузера Mozilla Firefox.
Расширение представляет из себя стартовую страницу с различными виджетами:
1. Ссылки на сайты
2. Заметки
3. Календарь
4. Калькулятор
5. Дата и время.
6. Задачи (todo)
Пользователь может создавать любое количество страниц. 
Пользователь может редактировать название каждой страницы. На каждой странице пользователь 
определяет необходимый набор виджетов. Вся информация должна храниться 
локально в текстовых файлах. Для работы расширения не должен требоваться веб-сервер.
